name: Release

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches:
      - master
      - beta
      - pre-release

jobs:  
  semantic_release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
        contents: write
        issues: write
        pull-requests: write
        id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
            ref: ${{ github.event.workflow_run.head_sha }}
            fetch-depth: 0
            
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_HEAD: ${{ github.event.workflow_run.head_sha }}
